# Workflow: Build and Push Docker Container
# Description: Builds and pushes Docker image for the Agent service whenever code is pushed to master branch.
# Why: Provides reproducible, versioned container images for deployments.

name: Build and Push Container

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Agent
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Agent image by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          labels: ${{ steps.meta-agent.outputs.labels }}
          cache-from: type=gha,scope=agent-amd64
          cache-to: type=gha,mode=max,scope=agent-amd64
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/agent
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/agent/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-agent-amd64
          path: /tmp/digests/agent/*
          if-no-files-found: error
          retention-days: 1

  merge-agent:
    runs-on: ubuntu-latest
    needs: build-agent
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/agent
          pattern: digests-agent-*
          merge-multiple: true

      - name: Check for digests
        id: check
        run: |
          if [ -d "/tmp/digests/agent" ] && [ "$(ls -A /tmp/digests/agent 2>/dev/null)" ]; then
            echo "has_digests=true" >> $GITHUB_OUTPUT
            echo "Found digests:"
            ls -la /tmp/digests/agent
          else
            echo "has_digests=false" >> $GITHUB_OUTPUT
            echo "No digests found, skipping manifest creation"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.has_digests == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: steps.check.outputs.has_digests == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Agent
        if: steps.check.outputs.has_digests == 'true'
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Create manifest list and push
        if: steps.check.outputs.has_digests == 'true'
        run: |
          cd /tmp/digests/agent
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        if: steps.check.outputs.has_digests == 'true'
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
